<script>
    function sendToExtension(data) {
        window.parent.postMessage({
            type: "FROM_IFRAME",
            data
        }, "*");
    }
    window.addEventListener("message", (event) => {
        if (event.data?.type === "FROM_EXTENSION") {
            if (event.data.data[0] == "baseJSON") {
                window.baseJSON = event.data[1]
            }
        }
    });

</script>

    function get_or_create_var(varname) {
        if (!vars_to_add_names[varname]) {
            varID = generateBlockId()
            vars_to_add_names[varname] = varID
            vars_to_add[varID] = [varname, 0]

    function input_tostring(ipt) {
        if (ipt[0] != 1) {
            return ipt
        }
        

        ipt[1][1] = ipt[1][1].toString()

        console.log(ipt)

        return ipt
    }

    function change_input_parent(ipt, parent) { //for custom opers + more
        if (ipt[0] != 3) {
            return false
        }
        
        blocks_to_add[ipt[1]]["parent"] = parent

        return true
    }

    function readFOR_INPUT(Stuff, bid, ISCUSTOM) {
        console.log(Stuff, ISCUSTOM)
        if (Stuff["type"] == "NumericLiteral") {

            return [
                                1,
                                    [
                                        4,
                                        Stuff['value']
                                    ]
                                ]

        } else if (Stuff["type"] == "UnaryExpression") {
            const arg = readFOR_INPUT(Stuff["argument"], null, ISCUSTOM)
            const oper = Stuff["operator"]
            const ExID = generateBlockId()
            if (oper == "not") {

                let operB = {
                            "opcode": "operator_not",
                            "next": null,
                            "parent": bid,
                            "inputs": {
                                "OPERAND": arg
                            },
                            "fields": {},
                            "shadow": false,
                            "topLevel": false
                        }
                blocks_to_add[ExID] = operB

                return [3, ExID]   

            } else {
                let operB = {
                            "opcode": MathOpers[oper],
                            "next": null,
                            "parent": bid,
                            "inputs": {
                                "NUM1": [ //0 for unary
                                1,
                                [
                                    4,
                                    0
                                ]
                                ],
                                "NUM2": arg
                            },
                            "fields": {},
                            "shadow": false,
                            "topLevel": false
                        }
                blocks_to_add[ExID] = operB

                return [3, ExID]   
            }
            
   

        } else if (Stuff["type"] == "BooleanLiteral") {
                if (Stuff["value"] == true) { //empty NOT is true
                    notblock = {
                        "opcode": "operator_not",
                        "next": null,
                        "parent": bid,
                        "inputs": {},
                        "fields": {},
                        "shadow": false,
                        "topLevel": false
                    }
                    g1 = generateBlockId()
                    blocks_to_add[g1] = notblock

                    return [3, g1]
                } else { //empty OR is false
                    notblock = {
                        "opcode": "operator_or",
                        "next": null,
                        "parent": bid,
                        "inputs": {},
                        "fields": {},
                        "shadow": false,
                        "topLevel": false
                    }
                    g1 = generateBlockId()
                    blocks_to_add[g1] = notblock

                    return [3, g1]
                }

        
        } else if (Stuff["type"] == "Identifier") {

            if (ISCUSTOM && arg_ids[ISCUSTOM] && arg_ids[ISCUSTOM][Stuff["name"]]) {
                let ITSID = generateBlockId()
                let makestrog =  {
                    "opcode": "argument_reporter_string_number",
                    "next": null,
                    "parent": null,
                    "inputs": {},
                    "fields": {
                        "VALUE": [
                        Stuff["name"],
                        null
                        ]
                    },
                    "shadow": true,
                    "topLevel": false
                    }
                blocks_to_add[ITSID] = makestrog


                return [3, ITSID]
            } else {

                let varinfo = get_or_create_var(Stuff["name"])
                return [
                3,
                [
                    12,
                    varinfo[0],
                    varinfo[1]
                ]
                ]
            }
            


        } else if (Stuff["type"] == "StringLiteral") {
            return [
                                1,
                                    [
                                        4,
                                        JSON.parse(Stuff["raw"])
                                    ]
                                ]
            
            
        } else if (Stuff["type"] == "BinaryExpression") {
            const ExID = generateBlockId()
            const oper = Stuff["operator"]

      
            let LV = readFOR_INPUT(Stuff["left"], ExID, ISCUSTOM)
            let RV = readFOR_INPUT(Stuff["right"], ExID, ISCUSTOM)

            console.log(OperTypes[oper], oper)

            if (OperTypes[oper] == "NUM") {
                if (MathOpers[oper]) {
                    let operB = {
                                    "opcode": MathOpers[oper],
                                    "next": null,
                                    "parent": bid,
                                    "inputs": {
                                        "NUM1": LV,
                                        "NUM2": RV
                                    },
                                    "fields": {},
                                    "shadow": false,
                                    "topLevel": false
                                }
                    

                    blocks_to_add[ExID] = operB
                } else {

                }

            } else if (OperTypes[oper] == "STRING") {
                LV = input_tostring(LV)
                RV = input_tostring(RV)

                if (MathOpers[oper]) {
                let operB = {
                                "opcode": MathOpers[oper],
                                "next": null,
                                "parent": bid,
                                "inputs": {
                                    "STRING1": LV,
                                    "STRING2": RV
                                },
                                "fields": {},
                                "shadow": false,
                                "topLevel": false
                            }
                

                blocks_to_add[ExID] = operB

                } else {

                }

            } else if (OperTypes[oper] == "OPERAND") {
                LV = input_tostring(LV)
                RV = input_tostring(RV)

                if (MathOpers[oper]) {
                let operB = {
                                "opcode": MathOpers[oper],
                                "next": null,
                                "parent": bid,
                                "inputs": {
                                    "OPERAND1": LV,
                                    "OPERAND2": RV
                                },
                                "fields": {},
                                "shadow": false,
                                "topLevel": false
                            }
                

                blocks_to_add[ExID] = operB

                } else {
                    if (oper == ">=") {
                        let mainAND = {
                                        "opcode": "operator_and",
                                        "next": null,
                                        "parent": bid,
                                        "inputs": {
                                            "OPERAND1": null,
                                            "OPERAND2": null,
                                        },
                                        "fields": {},
                                        "shadow": false,
                                        "topLevel": false
                                    }

                        blocks_to_add[ExID] = mainAND

                        eID = generateBlockId()
                                    let operA = {
                                        "opcode": "operator_equals",
                                        "next": null,
                                        "parent": ExID,
                                        "inputs": {
                                            "OPERAND1": LV,
                                            "OPERAND2": RV,
                                        },
                                        "fields": {},
                                        "shadow": false,
                                        "topLevel": false
                                    }
                        blocks_to_add[eID] = operA
                        
                        gtID = generateBlockId()
                        let operB = {
                                        "opcode": "operator_gt",
                                        "next": null,
                                        "parent": ExID,
                                        "inputs": {
                                            "OPERAND1": LV,
                                            "OPERAND2": RV,
                                        },
                                        "fields": {},
                                        "shadow": false,
                                        "topLevel": false
                                    }
                        blocks_to_add[gtID] = operB

                        blocks_to_add[ExID]["inputs"]["OPERAND1"] = [3, gtID]
                        blocks_to_add[ExID]["inputs"]["OPERAND2"] = [3, eID]
                        
                    } else if (oper == "<=") {
                        let mainAND = {
                                        "opcode": "operator_and",
                                        "next": null,
                                        "parent": bid,
                                        "inputs": {
                                            "OPERAND1": null,
                                            "OPERAND2": null,
                                        },
                                        "fields": {},
                                        "shadow": false,
                                        "topLevel": false
                                    }

                        blocks_to_add[ExID] = mainAND

                        eID = generateBlockId()
                                    let operA = {
                                        "opcode": "operator_equals",
                                        "next": null,
                                        "parent": ExID,
                                        "inputs": {
                                            "OPERAND1": LV,
                                            "OPERAND2": RV,
                                        },
                                        "fields": {},
                                        "shadow": false,
                                        "topLevel": false
                                    }
                        blocks_to_add[eID] = operA
                        
                        gtID = generateBlockId()
                        let operB = {
                                        "opcode": "operator_lt",
                                        "next": null,
                                        "parent": ExID,
                                        "inputs": {
                                            "OPERAND1": LV,
                                            "OPERAND2": RV,
                                        },
                                        "fields": {},
                                        "shadow": false,
                                        "topLevel": false
                                    }
                        blocks_to_add[gtID] = operB

function libraryCheck(exid, base, Opcode, args, bid) {
                if (base.indexer == ".") {
                    const library = base.base.name
                    const func = base.identifier.name

                    console.log(library, func)

                    function lilmathop(op) {
                            let createNEWBLOCK = {
                                "opcode": "operator_mathop",
                                "next": null,
                                "parent": bid,
                                "inputs": {},
                                "fields": {
                                    "OPERATOR": [
                                        op,
                                        null
                                    ]
                                },
                                "shadow": false,
                                "topLevel": false
                            }

                            let argnames = ["NUM"]

                            let counter = 0
                            for (const i of args) {
                                createNEWBLOCK.inputs[argnames[counter]] = readFOR_INPUT(i, exid)
                                counter += 1
                            }


                            blocks_to_add[exid] = createNEWBLOCK

                            return [true, [3, exid]]


                    }


                    if (library == "math") {
                        if (func == "round") {

                            let createNEWBLOCK = {
                                "opcode": "operator_round",
                                "next": null,
                                "parent": bid,
                                "inputs": {},
                                "fields": {},
                                "shadow": false,
                                "topLevel": false
                            }

                            let argnames = ["NUM"]

                            let counter = 0
                            for (const i of args) {
                                createNEWBLOCK.inputs[argnames[counter]] = readFOR_INPUT(i, exid)
                                counter += 1
                            }


                            blocks_to_add[exid] = createNEWBLOCK

                            return [true, [3, exid]]
                        } else if (func == "abs") {
                             return lilmathop("abs")
                        } else if (func == "floor") {
                            return lilmathop("floor")
                        } else if (func == "log") {
                            return lilmathop("log")
                        } else if (func == "ceiling") {
                            return lilmathop("ceiling")
                        } else if (func == "sqrt") {
                            return lilmathop("sqrt")
                        } else if (func == "sin") {
                            return lilmathop("sin")
                        } else if (func == "cos") {
                            return lilmathop("cos")
                        } else if (func == "tan") {
                            return lilmathop("tan")
                        } else if (func == "asin") {
                            return lilmathop("asin")
                        } else if (func == "acos") {
                            return lilmathop("acos")
                        } else if (func == "atan") {
                            return lilmathop("atan")
                        } else if (func == "ln") {
                            return lilmathop("ln")
                        } else if (func == "euler") {
                            return lilmathop("e ^")
                        } else if (func == "pow10") {
                            return lilmathop("10 ^")
                        }

                    }


                }
    return [false]
}

function waitForEditor() {
    return new Promise((resolve) => {
        const check = () => {
            if (window.editor && window.editor.getValue) {
                resolve(window.editor);
            } else {
                setTimeout(check, 100);
            }
        };
        check();
    });
}

window.baseJSON = null


function waitForBaseJSON() {
    return new Promise((resolve) => {
        const check = () => {
            if (window.baseJSON) {
                resolve(window.baseJSON);
            } else {
                setTimeout(check, 100);
            }
        };
        check();
    });
}

function generateBlockId() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
    let id = "";

    for (let i = 0; i < 20; i++) {
        id += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    return id;
}
function cloneZip(zip) {
    const newZip = new JSZip();

    zip.forEach((relativePath, file) => {
        if (!file.dir) {
            newZip.file(relativePath, file.async("arraybuffer"));
        }
    });

    return newZip;
}

function showError(message) {
    let el = document.getElementById("lua-error-banner");

    if (!el) {
        el = document.createElement("div");
        el.id = "lua-error-banner";

        el.style.position = "fixed";
        el.style.bottom = "0";
        el.style.left = "0";
        el.style.width = "100%";
        el.style.padding = "10px";
        el.style.background = "red";
        el.style.color = "white";
        el.style.zIndex = "999999";
        el.style.fontFamily = "sans-serif";

        document.body.appendChild(el);
    }

    el.textContent = message;
}

function clearError() {
    const el = document.getElementById("lua-error-banner");
    if (el) el.remove();
}

async function InjectToScratch() {
    try {
        clearError();

        const projectJSON = await COMPILE_TO_SB3();
        console.log(projectJSON);

    } catch (err) {
        console.error(err);

        showError(err?.message || String(err));
    }
}


</script>
