  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #1e1e1e;
      color: white;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      background: #2c2c2c;
      padding: 8px;
      gap: 8px;
    }

    .topbar button {
      background: #444;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
    }

.main {
  display: flex;
  height: calc(100vh - 40px);
  overflow: hidden; /* IMPORTANT */
}

.panel {
  width: 300px;
  background: #2a2a2a;
  padding: 10px;

  height: 100%;        /* fill parent */
  overflow-y: auto;    /* enable vertical scroll */
}

    #editor {
        width: 70%;
    }
.block {
  background: #4c97ff;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 6px;
  cursor: pointer;
  user-select: none;
  transition: 0.15s;
}

.block:hover {
  background: #6aa9ff;
}

.block.motion { background: #4c97ff; }      /* blue */
.block.looks { background: #9966ff; }       /* purple */
.block.sound { background: #d65cd6; }       /* pink */
.block.event { background: #ffbf00; }      /* yellow */
.block.control { background: #ffab19; }     /* orange */
.block.sensing { background: #5cb1d6; }     /* light blue */
.block.operator { background: #59c059; }   /* green */
.block.data { background: #ff8c1a; }        /* dark orange */
.block.myblocks { background: #ff6680; }    /* red/pink */

  </style>
